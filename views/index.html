<!DOCTYPE html>
<html>
<head>
    <title>SS Robotics Store</title>

    <style>

        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        header{
            background:#111;
            color:white;
            padding:15px;
            font-size:24px;
        }

        .products{
            display:flex;
            gap:20px;
            padding:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:10px;
            width:200px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            background:#ff9800;
            border:none;
            padding:10px;
            color:white;
            cursor:pointer;
        }

    </style>
</head>

<body>

<header>
🤖 SS Robotics Store
</header>

<div class="products">

<div class="card">
<h3>Arduino Uno</h3>
<p>₹499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<h3>Ultrasonic Sensor</h3>
<p>₹120</p>
<button>Add to Cart</button>
</div>

<div class="card">
<h3>Robot Car Kit</h3>
<p>₹899</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
