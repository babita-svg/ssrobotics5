<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.login-box{
width:300px;
margin:auto;
margin-top:100px;
background:white;
padding:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>

</html>
